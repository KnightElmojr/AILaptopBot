<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Bot Web App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">LaptopBot - помічник по вибору ноутбука</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Головна</a>
                <a class="nav-link" href="/about">Про нас</a>
                <a class="nav-link" href="/form">Форма</a>
                <a class="nav-link" href="/tasks">Завдання</a>
                <a class="nav-link" href="/chat">Чат</a>
                {% if current_user.is_authenticated %}
                    <a class="nav-link text-warning" href="/logout">Вийти ({{ current_user.username }})</a>
                {% else %}
                    <a class="nav-link" href="/login">Вхід</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
    const globalSocket = io();

    globalSocket.on('receive_message', function(data) {
        if (data.user === 'Система') {
            alert("🔔 Нове сповіщення: " + data.msg);
        }
    });
</script>
</body>
</html>
